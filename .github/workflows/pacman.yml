name: Generate Pacman/Snake Animation

on:
  # 每天自动更新一次
  schedule:
    - cron: "0 0 * * *"
  # 允许你手动点击按钮更新
  workflow_dispatch:
  # 每次你修改主页代码时也会顺便更新
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 使用经典的画图工具
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # 这里输出的文件名，刚好对应你代码里的名字！
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg?palette=github-dark

      # 将生成的图片自动保存到 output 分支
      - name: push svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
